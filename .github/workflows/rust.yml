name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sox libsox-fmt-all libasound2-dev pkg-config libudev-dev

    - name: Build
      run: cargo build --verbose

    - name: Run All Tests
      # run unit and audio_integration test
      run: cargo test --verbose --all-targets
